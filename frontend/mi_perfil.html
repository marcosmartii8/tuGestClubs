<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - tuGestClub</title>
    <link rel="stylesheet" href="css/mi_perfil.css">
</head>
<body>
    <div class="profile-container">
        <h2>Mi Perfil</h2>
        <form id="profile-form">
            <div class="form-group">
                <label for="username">Nombre de Usuario:</label>
                <input type="text" id="username" name="username" readonly>
            </div>
            <div class="form-group">
                <label for="role">Rol:</label>
                <input type="text" id="role" name="role">
            </div>
            <div class="form-group">
                <label for="club-code">Código del Club:</label>
                <input type="text" id="club-code" name="club-code">
            </div>
            <button type="button" class="button" id="save-btn">Guardar</button>
            <button type="button" class="button" id="back-btn">Volver</button>
        </form>
    </div>
    <script src="js/auth-utils.js"></script>
    <script src="js/mi_perfil.js"></script>
</body>
</html>
