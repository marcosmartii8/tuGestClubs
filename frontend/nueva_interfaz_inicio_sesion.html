<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - tuGestClub</title>
    <link rel="stylesheet" href="css/nueva_interfaz_inicio_sesion.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape-1"></div>
        <div class="shape-2"></div>
    </div>

    <div class="container">
        <div class="login-header">
            <div class="logo-badge">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="24" cy="24" r="22" fill="#26a69a" opacity="0.2"/>
                    <path d="M24 10L30 18H18L24 10Z" fill="#004d40"/>
                    <path d="M18 22H30L26 32H22L18 22Z" fill="#26a69a"/>
                </svg>
            </div>
            <h1 class="title">Bienvenido</h1>
            <p class="subtitle">Accede a tu cuenta de tuGestClub</p>
        </div>

        <form onsubmit="handleLogin(event)" class="login-form">
            <div class="form-group">
                <label for="username">
                    <span class="label-icon">👤</span>
                    Nombre de Usuario
                </label>
                <input type="text" id="username" name="username" placeholder="Tu usuario" required>
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="password">
                    <span class="label-icon">🔐</span>
                    Contraseña
                </label>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                <div class="input-underline"></div>
            </div>

            <button type="submit" class="button-login">🔓 Iniciar Sesión</button>
        </form>

        <div class="button-group">
            <button type="button" class="button-back" onclick="window.location.href='index.html'">← Volver atrás</button>
        </div>

        <div class="footer-text">
            ¿Necesitas ayuda? Contacta con el administrador de tu club.
        </div>
    </div>

    <script src="js/auth-utils.js"></script>
    <script src="js/nueva_interfaz_inicio_sesion.js"></script>
</body>
</html>
