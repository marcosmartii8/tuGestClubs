<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - tuGestClub</title>
    <link rel="stylesheet" href="css/nueva_interfaz_inicio_sesion.css">
</head>
<body>
    <div class="container">
        <div class="title">Inicio de Sesión</div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="button">Iniciar Sesión</button>
            <a href="interfaz_lider.html" class="back-to-leader">Volver a la interfaz de líder</a>
        </form>
    </div>
    <script src="js/nueva_interfaz_inicio_sesion.js"></script>
</body>
</html>
