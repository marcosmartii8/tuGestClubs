<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - tuGestClub</title>
    <link rel="stylesheet" href="css/registro.css">
</head>
<body>
    <div class="form-container">
        <h2>Registro de Usuario</h2>
        <form onsubmit="handleRegistration(event)">
            <label for="username">Nombre de usuario:</label>
            <input type="text" id="username" name="username" required>
            
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
            
            <label for="repeat-password">Repetir contraseña:</label>
            <input type="password" id="repeat-password" name="repeat-password" required>
            
            <label for="club-code">Código del club:</label>
            <input type="text" id="club-code" name="club-code" required>
            
            <label for="role">Rol:</label>
            <select id="role" name="role" required>
                <option value="administrador">Administrador</option>
                <option value="lider">Líder</option>
                <option value="voluntario">Voluntario</option>
            </select>
            
            <div class="button-container">
                <button type="button" onclick="window.location.href='interfaz_lider.html'">Volver</button>
                <button type="submit">Registrar</button>
            </div>
        </form>
    </div>
    <script src="js/registro.js"></script>
</body>
</html>
