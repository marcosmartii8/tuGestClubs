<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - tuGestClub</title>
    <link rel="stylesheet" href="css/editar_perfil.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape-1"></div>
        <div class="shape-2"></div>
    </div>

    <div class="container">
        <div class="header-section">
            <div class="logo-badge">
                <svg width="48" height="48" viewBox="0 0 24 24" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 17c-2.5 0-4.5 1.5-4.5 3.5S9.5 23 12 23s4.5-1.5 4.5-2.5S14.5 17 12 17zm-6.5-2C7.3 15 9 13.3 9 11.5S7.3 8 5.5 8 2 9.7 2 11.5 3.7 15 5.5 15zm13 0c1.8 0 3.5-1.7 3.5-3.5S20.3 8 18.5 8 15 9.7 15 11.5s1.7 3.5 3.5 3.5zM7.5 7C8.9 7 10 5.7 10 4.5S8.9 2 7.5 2 5 3.3 5 4.5 6.1 7 7.5 7zm9 0c1.4 0 2.5-1.3 2.5-2.5S17.9 2 16.5 2 14 3.3 14 4.5 15.1 7 16.5 7z" fill="#26a69a"/>
                </svg>
            </div>
            <h1 class="title" id="profile-title">✏️ Editar Perfil</h1>
        </div>

        <form id="profile-form" class="profile-form">
            <div class="form-group">
                <label for="username">👤 Nombre de Usuario</label>
                <input type="text" id="username" name="username">
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="full-name">📝 Nombre Completo</label>
                <input type="text" id="full-name" name="full-name">
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="email">📧 Correo Electrónico</label>
                <input type="email" id="email" name="email">
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="dni">🆔 DNI</label>
                <input type="text" id="dni" name="dni">
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="address">📍 Dirección (Población)</label>
                <input type="text" id="address" name="address">
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="phone">☎️ Número de Teléfono</label>
                <input type="text" id="phone" name="phone">
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="km">🚗 Kilómetros hasta el Club</label>
                <input type="number" id="km" name="km">
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="club-code">🏢 Código del Club</label>
                <input type="text" id="club-code" name="club-code" readonly>
                <div class="input-underline"></div>
            </div>

            <div class="form-group">
                <label for="role">👑 Rol</label>
                <input type="text" id="role" name="role" readonly>
                <div class="input-underline"></div>
            </div>

            <div class="button-container">
                <button type="button" class="button-back">← Atrás</button>
                <button type="button" class="button-save" id="save-btn">💾 Guardar</button>
            </div>
        </form>
    </div>

    <script src="js/auth-utils.js"></script>
    <script src="js/editar_perfil.js"></script>
</body>
</html>
